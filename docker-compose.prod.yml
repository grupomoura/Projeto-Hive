services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: production
      PORT: '3001'
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-openhive-minio}
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-instapost-images}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-changeme}
      NANO_BANANA_PROVIDER: ${NANO_BANANA_PROVIDER:-google}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    environment:
      API_URL: http://api:3001
      API_TOKEN: ${INTERNAL_SERVICE_TOKEN:-changeme}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    environment:
      API_URL: http://api:3001
      API_TOKEN: ${INTERNAL_SERVICE_TOKEN:-changeme}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
